<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contract Intelligence — Select MATOC</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #0D1117; margin:0; min-height:100vh; font-family: Arial, sans-serif;
    display:flex; align-items:center; justify-content:center; padding: 40px 20px;
  }
  .wrap { max-width: 780px; width:100%; text-align:center; }
  h1 { color:#F0F6FC; font-size: 30px; margin-bottom: 6px; }
  p.sub { color:#8B949E; margin-top:0; margin-bottom: 40px; font-size:15px; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width:700px){ .grid{ grid-template-columns: 1fr; } }
  a.card {
    display:block; background:#161B22; border:1px solid #30363D; border-radius:14px;
    padding: 32px 20px; text-decoration:none; color:#F0F6FC; transition: all .15s ease;
    position:relative; overflow:hidden;
  }
  a.card:hover { border-color:#58A6FF; transform: translateY(-3px); }
  a.card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:4px;
    background: linear-gradient(90deg,#58A6FF,#79C0FF);
  }
  .card .name { font-size:20px; font-weight:700; margin-bottom:8px; }
  .card .desc { font-size:12px; color:#8B949E; }
</style>
</head>
<body>
  
  <div class="wrap">
    <h1>Contract Intelligence Dashboard</h1>
    <p class="sub">Select a MATOC to view its competitive pricing &amp; win/loss dashboard</p>
    <div class="grid">
      {% for slug, label in matocs.items() %}
      <a class="card" href="{{ url_for('dashboard', slug=slug) }}">
        <div class="name">{{ label }}</div>
        <div class="desc">View dashboard</div>
      </a>
      {% endfor %}
      {% if is_admin %}
      <a class="card admin-card" href="{{ url_for('admin_dashboard') }}">
        <div class="name">Admin Panel</div>
        <div class="desc">Full Website Control</div>
      </a>
      {% endif %}
    </div>
  </div>
</body>
</html>
