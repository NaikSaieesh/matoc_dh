<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>
<style>
  * { box-sizing: border-box; }
  body {
    background:#0D1117; margin:0; padding:0; font-family:Arial,sans-serif; color:#F0F6FC;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .login-panel {
    background:#161B22; border:1px solid #30363D; border-radius:12px;
    padding:32px; width:100%; max-width:360px; margin:20px;
  }
  h2 {
    color:#58A6FF; font-size:22px; margin:0 0 6px; text-align:center;
  }
  p.sub {
    color:#8B949E; margin:0 0 22px; font-size:13px; text-align:center;
  }
  .flash {
    background:#3d1418; border:1px solid #F85149; color:#F85149;
    padding:10px 14px; border-radius:8px; font-size:13px; margin:0 0 16px;
  }
  .field { margin-bottom:16px; }
  label {
    display:block; color:#8B949E; font-size:12px; font-weight:600;
    margin-bottom:6px; text-transform:uppercase; letter-spacing:0.03em;
  }
  input[type=text], input[type=password] {
    width:100%; padding:10px 12px; border-radius:8px; border:1px solid #30363D;
    background:#0D1117; color:#F0F6FC; font-size:13px;
  }
  input[type=text]:focus, input[type=password]:focus {
    outline:none; border-color:#58A6FF;
  }
  button.btn-login {
    width:100%; margin-top:6px; padding:10px 12px; border-radius:8px;
    border:1px solid #1F6FEB; background:#1F6FEB; color:#fff;
    font-size:13px; font-weight:600; cursor:pointer;
  }
  button.btn-login:hover { background:#388BFD; }
</style>
</head>
<body>
  <div class="login-panel">
    <h2>Admin Login</h2>
    <p class="sub">Sign in to continue</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button class="btn-login" type="submit">Log In</button>
    </form>
  </div>
</body>
</html>
